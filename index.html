<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewPlan Pro - Planificador Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // --- CONFIGURACIÓN ---
        const firebaseConfig = {
            apiKey: "AIzaSyBSaIzbcFiyTF1zy9_9Z97ZSPfL322xO24",
            authDomain: "inventariochuyma-da052.firebaseapp.com",
            projectId: "inventariochuyma-da052",
            storageBucket: "inventariochuyma-da052.firebasestorage.app",
            messagingSenderId: "677439195293",
            appId: "1:677439195293:web:50b624de9e0c877c89ec74"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- LÓGICA DE PROCESOS ---
        const EQUIPMENT_LIMITS = { fermenter: 2, maturation: 2, carbonation: 1 };
        
        const RECIPES = {
            pale: { 
                name: 'Pale Ale', 
                phases: [
                    { name: 'Cocción', offset: 0, duration: 1, equip: null },
                    { name: 'Fermentación', offset: 1, duration: 7, equip: 'fermenter' },
                    { name: 'Trasvasije de Fermentación a Maduración', offset: 8, duration: 1, equip: null },
                    { name: 'Maduración', offset: 9, duration: 6, equip: 'maturation' },
                    { name: 'Trasiego de Maduración a Carbonatación', offset: 15, duration: 1, equip: null },
                    { name: 'Carbonatación', offset: 16, duration: 1, equip: 'carbonation' },
                    { name: 'Envasado', offset: 17, duration: 1, equip: 'carbonation' }
                ] 
            },
            amber: { 
                name: 'Amber Ale', 
                phases: [
                    { name: 'Cocción', offset: 0, duration: 1, equip: null },
                    { name: 'Fermentación', offset: 1, duration: 7, equip: 'fermenter' },
                    { name: 'Dry Hop + Descanso', offset: 8, duration: 3, equip: 'fermenter' },
                    { name: 'Trasvasije de Fermentación a Maduración', offset: 11, duration: 1, equip: null },
                    { name: 'Maduración', offset: 12, duration: 4, equip: 'maturation' },
                    { name: 'Trasiego de Maduración a Carbonatación', offset: 16, duration: 1, equip: null },
                    { name: 'Carbonatación', offset: 17, duration: 1, equip: 'carbonation' },
                    { name: 'Envasado', offset: 18, duration: 1, equip: 'carbonation' }
                ] 
            }
        };

        const CHILEAN_HOLIDAYS = ["2026-01-01", "2026-04-03", "2026-04-04", "2026-05-01", "2026-05-21", "2026-06-29", "2026-07-16", "2026-08-15", "2026-09-18", "2026-09-19", "2026-10-12", "2026-10-31", "2026-11-01", "2026-12-08", "2026-12-25"];

        let productionQueue = [];
        let allBatches = [];

        // --- FUNCIONES UTILITARIAS ---
        window.formatDate = (isoDate) => { const [y, m, d] = isoDate.split('-'); return `${d}-${m}-${y}`; };
        window.isWorkingDay = (date, phaseName) => {
            const day = date.getDay();
            const dateStr = date.toISOString().split('T')[0];
            if (day === 0 || CHILEAN_HOLIDAYS.includes(dateStr)) return false;
            if (day === 6) return phaseName !== 'Cocción';
            return true;
        };
        window.addDaysWork = (startDate, offset, phaseName) => {
            let result = new Date(startDate);
            let added = 0;
            while (added < offset) {
                result.setDate(result.getDate() + 1);
                if (window.isWorkingDay(result, phaseName)) added++;
            }
            return result.toISOString().split('T')[0];
        };

        window.checkCapacityConflict = (newBatches) => {
            const usageTimeline = {};
            const all = [...allBatches, ...newBatches];
            for (const b of all) {
                for (const p of b.phases) {
                    if (p.equip) {
                        for (let d = 0; d < p.duration; d++) {
                            let dateObj = new Date(p.date);
                            dateObj.setDate(dateObj.getDate() + d);
                            const dateStr = dateObj.toISOString().split('T')[0];
                            if (!usageTimeline[dateStr]) usageTimeline[dateStr] = { fermenter: 0, maturation: 0, carbonation: 0 };
                            usageTimeline[dateStr][p.equip]++;
                            if (usageTimeline[dateStr][p.equip] > EQUIPMENT_LIMITS[p.equip]) return { conflict: true, date: dateStr, equip: p.equip };
                        }
                    }
                }
            }
            return { conflict: false };
        };

        // --- FUNCIONES CORE ---
        window.addToQueue = () => {
            const recipeKey = document.getElementById('recipeSelect').value;
            const count = parseInt(document.getElementById('batchCount').value || 1);
            productionQueue.push({ recipeKey, count, name: RECIPES[recipeKey].name });
            renderQueue();
        };

        function renderQueue() {
            document.getElementById('queueList').innerHTML = productionQueue.map((item, index) => `
                <div class="flex justify-between items-center bg-purple-50 p-2 mb-1 rounded text-sm text-purple-800">
                    <span>${item.name} (${item.count})</span>
                    <button onclick="productionQueue.splice(${index}, 1); renderQueue()" class="text-rose-400">Eliminar</button>
                </div>
            `).join('');
        }

        window.programarProduccion = async () => {
            const startDateValue = document.getElementById('startDate').value;
            if (!startDateValue || productionQueue.length === 0) return;
            let currentCoccionDate = new Date(startDateValue);
            let proposedBatches = [];
            
            for (const item of productionQueue) {
                for (let i = 0; i < item.count; i++) {
                    const phases = RECIPES[item.recipeKey].phases.map(p => ({
                        name: p.name, offset: p.offset, duration: p.duration, equip: p.equip,
                        date: window.addDaysWork(currentCoccionDate, p.offset, p.name)
                    }));
                    proposedBatches.push({ recipeKey: item.recipeKey, recipeName: item.name, phases });
                    let next = new Date(currentCoccionDate);
                    next.setDate(next.getDate() + 1);
                    while (!window.isWorkingDay(next, 'Cocción')) next.setDate(next.getDate() + 1);
                    currentCoccionDate = next;
                }
            }
            const check = checkCapacityConflict(proposedBatches);
            if (check.conflict) { if(!confirm(`ALERTA: Conflicto en ${check.equip} el ${check.date}. ¿Forzar?`)) return; }
            for (const b of proposedBatches) { await addDoc(collection(db, "brewplan_data"), { ...b, createdAt: new Date().getTime() }); }
            productionQueue = []; renderQueue(); loadData();
        };

        window.saveBatch = async (id, recipeKey, changedIndex, newDateValue) => {
            const offsetOfChanged = RECIPES[recipeKey].phases[changedIndex].offset;
            let baseDate = new Date(newDateValue);
            baseDate.setDate(baseDate.getDate() - offsetOfChanged);
            const updatedPhases = RECIPES[recipeKey].phases.map((p) => ({
                name: p.name, offset: p.offset, duration: p.duration, equip: p.equip,
                date: window.addDaysWork(baseDate, p.offset, p.name)
            }));
            await updateDoc(doc(db, "brewplan_data", id), { phases: updatedPhases });
            loadData();
        };

        window.loadData = async () => {
            const q = query(collection(db, "brewplan_data"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allBatches = [];
            snapshot.forEach(docSnap => allBatches.push({ id: docSnap.id, ...docSnap.data() }));
            
            const container = document.getElementById('dashboard');
            container.innerHTML = allBatches.map(b => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-purple-100 mb-4">
                    <div class="flex justify-between items-center mb-4 border-b pb-3">
                        <h3 class="font-bold text-purple-900">${b.recipeName}</h3>
                        <button onclick="deleteBatch('${b.id}')" class="text-rose-400 text-xs">Eliminar</button>
                    </div>
                    ${b.phases.map((p, i) => `
                        <div class="flex justify-between text-sm py-1">
                            <span class="text-purple-700 truncate max-w-[60%]">${p.name}</span>
                            <input type="date" value="${p.date}" onchange="saveBatch('${b.id}', '${b.recipeKey}', ${i}, this.value)" class="bg-purple-50 rounded px-1 text-right">
                        </div>
                    `).join('')}
                </div>
            `).join('');
            renderCalendar();
        };

        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = `<div class="grid grid-cols-7 gap-2 mb-2 font-bold text-[10px] uppercase text-purple-400"><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div></div>`;
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-7 gap-2";
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).getDay() || 7;
            const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
            
            for(let i=1; i<firstDay; i++) grid.innerHTML += `<div class="bg-gray-50 h-32 rounded-xl"></div>`;
            for(let d=1; d<=daysInMonth; d++){
                const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const tasks = [];
                allBatches.forEach(b => b.phases.forEach((p, i) => { if(p.date === dateStr) tasks.push({...p, bId: b.id, idx: i, rName: b.recipeName, rKey: b.recipeKey}) }));
                
                grid.innerHTML += `
                    <div class="bg-white h-32 p-1 border border-purple-100 rounded-xl overflow-y-auto">
                        <div class="text-[10px] font-bold text-purple-900">${d}</div>
                        ${tasks.map(t => `
                            <div class="text-[8px] bg-purple-50 mb-1 p-1 rounded truncate border-l-2 border-purple-300">
                                ${t.rName}: ${t.name}
                                <input type="date" value="${dateStr}" onchange="saveBatch('${t.bId}', '${t.rKey}', ${t.idx}, this.value)" class="w-full bg-transparent underline">
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            container.appendChild(grid);
        }

        window.deleteBatch = async (id) => { try { await deleteDoc(doc(db, "brewplan_data", id)); loadData(); } catch (e) { alert("Error."); } };
        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
        onAuthStateChanged(auth, (user) => { if (user) { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); loadData(); } });
        window.toggleView = (view) => { document.getElementById('listView').classList.toggle('hidden', view !== 'list'); document.getElementById('calendarView').classList.toggle('hidden', view !== 'calendar'); };
    </script>
</head>
<body class="bg-purple-50 p-4">
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-3xl shadow-2xl border border-purple-100">
        <h1 class="text-2xl font-bold text-purple-950 mb-6 text-center">BrewPlan Pro</h1>
        <input type="email" id="email" placeholder="Correo" class="w-full p-4 border rounded-2xl mb-4 bg-purple-50">
        <input type="password" id="password" placeholder="Clave" class="w-full p-4 border rounded-2xl mb-8 bg-purple-50">
        <button onclick="login()" class="w-full bg-purple-900 text-white py-4 rounded-2xl font-bold">Ingresar</button>
    </div>

    <div id="app-screen" class="hidden max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-purple-950 mb-6">Planificador Maestro</h1>
        <div class="flex gap-2 mb-6">
            <button onclick="toggleView('list')" class="flex-1 bg-purple-900 text-white py-2 rounded-xl font-bold">Configuración</button>
            <button onclick="toggleView('calendar')" class="flex-1 bg-purple-800 text-white py-2 rounded-xl font-bold">Calendario</button>
        </div>
        
        <div id="listView" class="bg-white p-6 rounded-3xl shadow-sm border border-purple-100 mb-8">
            <input type="date" id="startDate" class="w-full p-3 bg-purple-50 border rounded-xl mb-4">
            <div class="grid grid-cols-2 gap-2">
                <select id="recipeSelect" class="w-full p-3 bg-purple-50 border rounded-xl"><option value="amber">Amber Ale</option><option value="pale">Pale Ale</option></select>
                <input type="number" id="batchCount" value="1" class="w-full p-3 bg-purple-50 border rounded-xl">
            </div>
            <button onclick="addToQueue()" class="w-full bg-purple-100 text-purple-800 py-2 rounded-xl font-bold mt-2">Añadir a Cola</button>
            <div id="queueList" class="my-4"></div>
            <button onclick="programarProduccion()" class="w-full bg-purple-800 text-white py-3 rounded-xl font-bold">Programar Producción</button>
            <div id="dashboard" class="mt-8 space-y-4"></div>
        </div>

        <div id="calendarView" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-purple-100">
            <div id="calendarContainer"></div>
        </div>
    </div>
</body>
</html>
