<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewPlan Pro - Producción</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSaIzbcFiyTF1zy9_9Z97ZSPfL322xO24",
            authDomain: "inventariochuyma-da052.firebaseapp.com",
            projectId: "inventariochuyma-da052",
            storageBucket: "inventariochuyma-da052.firebasestorage.app",
            messagingSenderId: "677439195293",
            appId: "1:677439195293:web:50b624de9e0c877c89ec74"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // FERIADOS CHILE 2026 (Puedes agregar más si lo necesitas)
        const CHILEAN_HOLIDAYS = [
            "2026-01-01", "2026-04-03", "2026-04-04", "2026-05-01", 
            "2026-05-21", "2026-06-29", "2026-07-16", "2026-08-15", 
            "2026-09-18", "2026-09-19", "2026-10-12", "2026-10-31", 
            "2026-11-01", "2026-12-08", "2026-12-25"
        ];

        // Lógica de Calendario Laboral
        function isWorkingDay(date) {
            const day = date.getDay();
            if (day === 0) return false; // Domingo
            const dateStr = date.toISOString().split('T')[0];
            if (CHILEAN_HOLIDAYS.includes(dateStr)) return false; // Feriado
            return true; // Lunes a Sábado son días laborables
        }

        function addWorkDays(startDate, daysOffset) {
            let result = new Date(startDate);
            let added = 0;
            while (added < daysOffset) {
                result.setDate(result.getDate() + 1);
                if (isWorkingDay(result)) {
                    added++;
                }
            }
            return result;
        }

        // --- UI Y APP ---
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                loadData();
            } else {
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        window.login = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(e => alert("Error: " + e.message));
        };

        window.logout = () => signOut(auth);

        const RECIPES = {
            amber: { name: 'Amber Ale', phases: [{ name: 'Cocción', offset: 0 }, { name: 'Trasvase a Maduración', offset: 7 }, { name: 'Trasiego a Barril', offset: 14 }, { name: 'Carbonatación', offset: 15 }, { name: 'Envasado', offset: 16 }] },
            pale: { name: 'Pale Ale', phases: [{ name: 'Cocción', offset: 0 }, { name: 'Trasvase a Maduración', offset: 7 }, { name: 'Trasiego a Barril', offset: 14 }, { name: 'Carbonatación', offset: 15 }, { name: 'Envasado', offset: 16 }] }
        };

        window.addBatches = async () => {
            const recipeKey = document.getElementById('recipeSelect').value;
            const startDateValue = document.getElementById('startDate').value;
            if (!startDateValue) { alert("Selecciona fecha"); return; }
            
            const start = new Date(startDateValue);
            
            const batch = {
                recipeName: RECIPES[recipeKey].name,
                startDate: startDateValue,
                phases: RECIPES[recipeKey].phases.map(p => ({
                    name: p.name,
                    date: addWorkDays(start, p.offset).toISOString().split('T')[0]
                })),
                createdAt: new Date()
            };
            
            await addDoc(collection(db, "brewplan_data"), batch);
            loadData();
        };

        window.deleteBatch = async (id) => {
            if (confirm("¿Eliminar planificación?")) {
                await deleteDoc(doc(db, "brewplan_data", id));
                loadData();
            }
        };

        async function loadData() {
            const q = query(collection(db, "brewplan_data"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const b = docSnap.data();
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm border border-amber-100 mb-3 relative";
                div.innerHTML = `
                    <button onclick="deleteBatch('${docSnap.id}')" class="absolute top-2 right-2 text-red-500 font-bold">✕</button>
                    <h3 class="font-bold text-amber-900">${b.recipeName}</h3>
                    <p class="text-xs text-gray-500 mb-2">Inicio: ${b.startDate}</p>
                    <div class="space-y-1">
                        ${b.phases.map(p => `<p class="text-sm flex justify-between"><span>${p.name}</span><span class="font-mono">${p.date}</span></p>`).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</head>
<body class="bg-stone-50 min-h-screen p-4">
    <div id="login-screen" class="max-w-sm mx-auto mt-20 bg-white p-6 rounded-2xl shadow-lg border border-amber-100">
        <h1 class="text-xl font-bold text-amber-900 mb-4 text-center">🔐 Acceso BrewPlan Pro</h1>
        <input type="email" id="email" placeholder="Correo" class="w-full p-2 border rounded-lg mb-2">
        <input type="password" id="password" placeholder="Clave" class="w-full p-2 border rounded-lg mb-4">
        <button onclick="login()" class="w-full bg-amber-800 text-white p-3 rounded-lg font-bold">Ingresar</button>
    </div>

    <div id="app-screen" class="hidden max-w-lg mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-amber-900">BrewPlan Pro</h1>
            <button onclick="logout()" class="text-xs text-gray-400 underline">Salir</button>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-amber-100">
            <select id="recipeSelect" class="w-full p-3 border rounded-xl mb-3">
                <option value="amber">Amber Ale</option>
                <option value="pale">Pale Ale</option>
            </select>
            <input type="date" id="startDate" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="addBatches()" class="w-full bg-amber-800 text-white py-3 rounded-xl font-bold">➕ Programar Producción</button>
        </div>

        <div id="dashboard" class="space-y-2"></div>
    </div>
</body>
</html>
