<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewPlan Pro - Planificador Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // --- CONFIGURACIÓN INTEGRADA ---
        const firebaseConfig = {
            apiKey: "AIzaSyBSaIzbcFiyTF1zy9_9Z97ZSPfL322xO24",
            authDomain: "inventariochuyma-da052.firebaseapp.com",
            projectId: "inventariochuyma-da052",
            storageBucket: "inventariochuyma-da052.firebasestorage.app",
            messagingSenderId: "677439195293",
            appId: "1:677439195293:web:50b624de9e0c877c89ec74"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- LÓGICA DE CAPACIDAD ---
        const EQUIPMENT_LIMITS = { fermenter: 2, maturation: 2, carbonation: 1 };

        const RECIPES = {
            pale: { 
                name: 'Pale Ale', 
                phases: [
                    { name: 'Cocción', offset: 0, duration: 1, equip: null },
                    { name: 'Fermentación', offset: 1, duration: 7, equip: 'fermenter' },
                    { name: 'Trasvasije', offset: 8, duration: 1, equip: null },
                    { name: 'Maduración', offset: 9, duration: 6, equip: 'maturation' },
                    { name: 'Carbonatación y Envasado', offset: 15, duration: 2, equip: 'carbonation' }
                ] 
            },
            amber: { 
                name: 'Amber Ale', 
                phases: [
                    { name: 'Cocción', offset: 0, duration: 1, equip: null },
                    { name: 'Fermentación', offset: 1, duration: 7, equip: 'fermenter' },
                    { name: 'Dry Hop + Descanso', offset: 8, duration: 3, equip: 'fermenter' },
                    { name: 'Trasvasije', offset: 11, duration: 1, equip: null },
                    { name: 'Maduración', offset: 11, duration: 4, equip: 'maturation' },
                    { name: 'Carbonatación y Envasado', offset: 15, duration: 2, equip: 'carbonation' }
                ] 
            }
        };

        const CHILEAN_HOLIDAYS = ["2026-01-01", "2026-04-03", "2026-04-04", "2026-05-01", "2026-05-21", "2026-06-29", "2026-07-16", "2026-08-15", "2026-09-18", "2026-09-19", "2026-10-12", "2026-10-31", "2026-11-01", "2026-12-08", "2026-12-25"];

        let productionQueue = [];
        let allBatches = [];

        window.formatDate = (isoDate) => {
            if (!isoDate) return '';
            const [y, m, d] = isoDate.split('-');
            return `${d}-${m}-${y}`;
        };

        window.isWorkingDay = (date, phaseName) => {
            const day = date.getDay();
            const dateStr = date.toISOString().split('T')[0];
            const isHoliday = CHILEAN_HOLIDAYS.includes(dateStr);
            if (day === 0 || isHoliday) return false;
            if (day === 6) return phaseName !== 'Cocción';
            return true;
        };

        window.addDaysWork = (startDate, offset, phaseName) => {
            let result = new Date(startDate);
            let added = 0;
            while (added < offset) {
                result.setDate(result.getDate() + 1);
                if (isWorkingDay(result, phaseName)) added++;
            }
            return result.toISOString().split('T')[0];
        };

        window.checkCapacityConflict = (newBatches) => {
            const usageTimeline = {};
            const all = [...allBatches, ...newBatches];
            
            for (const b of all) {
                for (const p of b.phases) {
                    if (p.equip) {
                        for (let d = 0; d < p.duration; d++) {
                            let dateObj = new Date(p.date);
                            dateObj.setDate(dateObj.getDate() + d);
                            const dateStr = dateObj.toISOString().split('T')[0];
                            if (!usageTimeline[dateStr]) usageTimeline[dateStr] = { fermenter: 0, maturation: 0, carbonation: 0 };
                            usageTimeline[dateStr][p.equip]++;
                            if (usageTimeline[dateStr][p.equip] > EQUIPMENT_LIMITS[p.equip]) return { conflict: true, date: dateStr, equip: p.equip };
                        }
                    }
                }
            }
            return { conflict: false };
        };

        window.addToQueue = () => {
            const recipeKey = document.getElementById('recipeSelect').value;
            const count = parseInt(document.getElementById('batchCount').value || 1);
            productionQueue.push({ recipeKey, count, name: RECIPES[recipeKey].name });
            renderQueue();
        };

        function renderQueue() {
            const list = document.getElementById('queueList');
            list.innerHTML = productionQueue.map((item, index) => `
                <div class="grid grid-cols-3 gap-4 items-center bg-purple-50 p-3 rounded-xl mb-2 text-sm">
                    <span class="col-span-2 font-bold text-purple-800">${item.name} (${item.count} lotes)</span>
                    <button onclick="productionQueue.splice(${index}, 1); renderQueue()" class="text-rose-400 text-xs text-right">Eliminar</button>
                </div>
            `).join('');
        }

        window.programarProduccion = async () => {
            const startDateValue = document.getElementById('startDate').value;
            if (!startDateValue || productionQueue.length === 0) return;
            
            let currentCoccionDate = new Date(startDateValue);
            let proposedBatches = [];
            
            for (const item of productionQueue) {
                for (let i = 0; i < item.count; i++) {
                    const phases = RECIPES[item.recipeKey].phases.map(p => ({
                        name: p.name,
                        offset: p.offset,
                        duration: p.duration,
                        equip: p.equip,
                        date: addDaysWork(currentCoccionDate, p.offset, p.name)
                    }));
                    proposedBatches.push({ recipeKey: item.recipeKey, recipeName: item.name, phases });
                    let next = new Date(currentCoccionDate);
                    next.setDate(next.getDate() + 1);
                    while (!isWorkingDay(next, 'Cocción')) next.setDate(next.getDate() + 1);
                    currentCoccionDate = next;
                }
            }

            const check = checkCapacityConflict(proposedBatches);
            if (check.conflict) {
                alert(`¡ALERTA! Conflicto detectado el ${formatDate(check.date)}. El equipo ${check.equip} está al límite.`);
                return;
            }

            for (const b of proposedBatches) {
                await addDoc(collection(db, "brewplan_data"), { ...b, createdAt: new Date().getTime() });
            }
            productionQueue = []; renderQueue(); loadData();
            alert("Producción programada exitosamente.");
        };

        window.loadData = async () => {
            const q = query(collection(db, "brewplan_data"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allBatches = [];
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const b = docSnap.data();
                allBatches.push({ id: docSnap.id, ...b });
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl shadow-sm border border-purple-100 mb-4";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b border-purple-50 pb-3">
                        <h3 class="font-bold text-purple-900 text-lg">${b.recipeName}</h3>
                        <button onclick="deleteBatch('${docSnap.id}')" class="text-rose-400 text-xs">Eliminar</button>
                    </div>
                    <div class="space-y-3">
                        ${b.phases.map((p, index) => `
                            <div class="grid grid-cols-2 items-center gap-4 text-sm">
                                <span class="font-medium text-purple-700">${p.name}</span>
                                <span class="text-right text-purple-900 font-bold">${formatDate(p.date)}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.deleteBatch = async (id) => { await deleteDoc(doc(db, "brewplan_data", id)); loadData(); };
        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert("Error: " + e.message));
        
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('app-screen').classList.remove('hidden'); 
                loadData(); 
            }
        });

        window.toggleView = (view) => {
            document.getElementById('listView').classList.toggle('hidden', view !== 'list');
            document.getElementById('calendarView').classList.toggle('hidden', view !== 'calendar');
        };
    </script>
</head>
<body class="bg-purple-50 p-4 md:p-8">
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-3xl shadow-2xl border border-purple-100">
        <h1 class="text-3xl font-bold text-purple-950 mb-8 text-center">BrewPlan Pro</h1>
        <input type="email" id="email" placeholder="Correo" class="w-full p-4 border rounded-2xl mb-4 bg-purple-50">
        <input type="password" id="password" placeholder="Clave" class="w-full p-4 border rounded-2xl mb-8 bg-purple-50">
        <button onclick="login()" class="w-full bg-purple-900 text-white py-4 rounded-2xl font-bold">Ingresar</button>
    </div>

    <div id="app-screen" class="hidden max-w-xl mx-auto">
        <h1 class="text-4xl font-bold text-purple-950 mb-8">Planificador</h1>
        
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-purple-100 mb-8">
            <h2 class="text-sm font-bold text-purple-400 uppercase tracking-widest mb-6">Planificación Mensual</h2>
            <label class="block text-xs font-bold text-purple-800 mb-2">Fecha Inicio Producción</label>
            <input type="date" id="startDate" class="w-full p-4 bg-purple-50 border rounded-2xl mb-4">
            
            <div class="grid grid-cols-2 gap-4">
                <select id="recipeSelect" class="w-full p-4 bg-purple-50 border rounded-2xl">
                    <option value="amber">Amber Ale</option>
                    <option value="pale">Pale Ale</option>
                </select>
                <input type="number" id="batchCount" value="1" class="w-full p-4 bg-purple-50 border rounded-2xl">
            </div>
            <button onclick="addToQueue()" class="w-full bg-purple-100 text-purple-800 py-3 rounded-2xl font-bold mb-6 mt-4">Añadir a Cola</button>
            <div id="queueList" class="mb-6"></div>
            <button onclick="programarProduccion()" class="w-full bg-purple-800 text-white py-4 rounded-2xl font-bold">Programar Calendario</button>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="toggleView('list')" class="flex-1 bg-purple-200 py-2 rounded-xl text-purple-900 font-bold">Dashboard</button>
            <button onclick="toggleView('calendar')" class="flex-1 bg-purple-800 py-2 rounded-xl text-white font-bold">Calendario</button>
        </div>
        
        <div id="listView"><div id="dashboard" class="space-y-4"></div></div>
        <div id="calendarView" class="hidden"><div id="calendarContainer" class="space-y-2"></div></div>
    </div>
</body>
</html>
