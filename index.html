<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewPlan Pro - Gestión de Planta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSaIzbcFiyTF1zy9_9Z97ZSPfL322xO24",
            authDomain: "inventariochuyma-da052.firebaseapp.com",
            projectId: "inventariochuyma-da052",
            storageBucket: "inventariochuyma-da052.firebasestorage.app",
            messagingSenderId: "677439195293",
            appId: "1:677439195293:web:50b624de9e0c877c89ec74"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Feriados Chile 2026
        const CHILEAN_HOLIDAYS = ["2026-01-01", "2026-04-03", "2026-04-04", "2026-05-01", "2026-05-21", "2026-06-29", "2026-07-16", "2026-08-15", "2026-09-18", "2026-09-19", "2026-10-12", "2026-10-31", "2026-11-01", "2026-12-08", "2026-12-25"];

        function isWorkingDay(date) {
            const day = date.getDay();
            if (day === 0) return false; // Domingo no trabaja
            const dateStr = date.toISOString().split('T')[0];
            return !CHILEAN_HOLIDAYS.includes(dateStr);
        }

        function getNextWorkingDay(date) {
            let next = new Date(date);
            next.setDate(next.getDate() + 1);
            while (!isWorkingDay(next)) {
                next.setDate(next.getDate() + 1);
            }
            return next;
        }

        function addDaysWork(startDate, offset) {
            let result = new Date(startDate);
            let added = 0;
            while (added < offset) {
                result.setDate(result.getDate() + 1);
                if (isWorkingDay(result)) added++;
            }
            return result.toISOString().split('T')[0];
        }

        const RECIPES = {
            amber: { name: 'Amber Ale', phases: [{ name: 'Cocción', offset: 0 }, { name: 'Inicio de fermentación', offset: 1 }, { name: 'Trasvase a Maduración', offset: 7 }, { name: 'Trasiego a Barril', offset: 14 }, { name: 'Carbonatación', offset: 15 }, { name: 'Envasado', offset: 16 }] },
            pale: { name: 'Pale Ale', phases: [{ name: 'Cocción', offset: 0 }, { name: 'Inicio de fermentación', offset: 1 }, { name: 'Trasvase a Maduración', offset: 7 }, { name: 'Trasiego a Barril', offset: 14 }, { name: 'Carbonatación', offset: 15 }, { name: 'Envasado', offset: 16 }] }
        };

        // UI Listeners
        window.login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Error de acceso: " + e.message));
        };

        window.logout = () => signOut(auth);

        window.addBatches = async () => {
            const recipeKey = document.getElementById('recipeSelect').value;
            const count = parseInt(document.getElementById('batchCount').value);
            const startDateValue = document.getElementById('startDate').value;
            if (!startDateValue) { alert("Selecciona fecha"); return; }
            
            let currentStart = new Date(startDateValue);
            
            for (let i = 0; i < count; i++) {
                const batch = {
                    recipeName: RECIPES[recipeKey].name,
                    phases: RECIPES[recipeKey].phases.map(p => ({
                        name: p.name,
                        date: addDaysWork(currentStart, p.offset)
                    })),
                    createdAt: new Date()
                };
                await addDoc(collection(db, "brewplan_data"), batch);
                currentStart = getNextWorkingDay(currentStart);
            }
            loadData();
        };

        window.deleteBatch = async (id) => {
            if(confirm("¿Segura de eliminar este lote?")) {
                await deleteDoc(doc(db, "brewplan_data", id));
                loadData();
            }
        };

        window.exportCSV = () => {
            let csv = "Receta,Fase,Fecha\n";
            document.querySelectorAll('#dashboard > div').forEach(div => {
                const recipe = div.dataset.recipe;
                div.querySelectorAll('p').forEach(p => {
                    csv += `${recipe},${p.dataset.phase},${p.dataset.date}\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "planificacion_produccion.csv";
            a.click();
        };

        async function loadData() {
            const q = query(collection(db, "brewplan_data"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const b = docSnap.data();
                const div = document.createElement('div');
                div.dataset.recipe = b.recipeName;
                div.className = "bg-white p-5 rounded-2xl shadow-sm border border-purple-100 mb-4";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-purple-900 text-lg">${b.recipeName}</h3>
                        <button onclick="deleteBatch('${docSnap.id}')" class="text-rose-500 hover:text-rose-700 text-sm font-semibold">Eliminar</button>
                    </div>
                    <div class="space-y-2">
                        ${b.phases.map(p => `<p class="text-sm flex justify-between text-purple-700" data-phase="${p.name}" data-date="${p.date}">
                            <span class="font-medium">${p.name}</span>
                            <span class="font-mono text-purple-900">${p.date}</span>
                        </p>`).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });
    </script>
</head>
<body class="bg-purple-50 min-h-screen p-4 md:p-8">
    
    <!-- Login Screen -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-xl border border-purple-100">
        <h1 class="text-2xl font-bold text-purple-950 mb-6 text-center">BrewPlan Pro</h1>
        <input type="email" id="email" placeholder="Correo" class="w-full p-4 border border-purple-200 rounded-xl mb-3 focus:ring-2 focus:ring-purple-500 outline-none">
        <input type="password" id="password" placeholder="Clave" class="w-full p-4 border border-purple-200 rounded-xl mb-6 focus:ring-2 focus:ring-purple-500 outline-none">
        <button onclick="login()" class="w-full bg-purple-900 text-white py-4 rounded-xl font-bold hover:bg-purple-800 transition">Ingresar</button>
    </div>

    <!-- App Screen -->
    <div id="app-screen" class="hidden max-w-xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <h1 class="text-3xl font-extrabold text-purple-950">Planificador</h1>
            <button onclick="logout()" class="text-purple-400 text-sm hover:text-purple-600">Salir</button>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-purple-100 mb-8">
            <select id="recipeSelect" class="w-full p-4 bg-purple-50 border border-purple-100 rounded-xl mb-3 font-medium text-purple-900">
                <option value="amber">Amber Ale</option>
                <option value="pale">Pale Ale</option>
            </select>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="date" id="startDate" class="p-4 bg-purple-50 border border-purple-100 rounded-xl text-purple-900">
                <input type="number" id="batchCount" placeholder="Cant. lotes" value="1" min="1" class="p-4 bg-purple-50 border border-purple-100 rounded-xl text-purple-900">
            </div>
            <div class="flex gap-2">
                <button onclick="addBatches()" class="flex-1 bg-purple-800 text-white py-4 rounded-xl font-bold hover:bg-purple-900 shadow-md">Programar Producción</button>
                <button onclick="exportCSV()" class="bg-purple-100 text-purple-700 px-6 rounded-xl font-bold hover:bg-purple-200">📥</button>
            </div>
        </div>

        <div id="dashboard" class="space-y-2"></div>
    </div>
</body>
</html>
